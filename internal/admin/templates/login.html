<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — SAINS Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
        }

        .brand {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .brand span {
            color: #206bc4;
        }
    </style>
</head>

<body class="theme-dark">
    <div class="login-card">
        <div class="brand">⚛️ <span>SAINS</span> Admin</div>
        <div class="card">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Login to Dashboard</h2>
                {{if .Error}}
                <div class="alert alert-danger">{{.Error}}</div>
                {{end}}
                <form method="POST" action="/admin/login">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="admin@sains.id" required
                            autofocus value="{{.Email}}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24"
                            stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                            <path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2" />
                            <path d="M20 12h-13l3 -3m0 6l-3 -3" />
                        </svg>
                        Sign In
                    </button>
                </form>
            </div>
        </div>
        <div class="text-center text-muted mt-3">
            <small>Only admin accounts can access this dashboard.</small>
        </div>
    </div>
</body>

</html>
